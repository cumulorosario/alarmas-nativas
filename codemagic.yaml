workflows:
  android-native-debug:
    name: Vigia Industrial — Android Nativo (Debug APK)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      java: 17

    scripts:
      - name: Set execute permission on Gradle wrapper
        script: |
          cd android 2>/dev/null || true
          chmod +x gradlew

      - name: Build Debug APK
        script: |
          ./gradlew assembleDebug \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            --no-daemon \
            --stacktrace

    artifacts:
      - app/build/outputs/apk/debug/*.apk
      - app/build/outputs/logs/**

    publishing:
      email:
        recipients:
          - cumulorosario@gmail.com
        notify:
          success: true
          failure: true

  android-native-release:
    name: Vigia Industrial — Android Nativo (Release AAB)
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      java: 17
      android_signing:
        - vigia_keystore   # Nombre del keystore en Codemagic → App settings → Code signing

    scripts:
      - name: Set permissions
        script: chmod +x gradlew

      - name: Build Release AAB
        script: |
          ./gradlew bundleRelease \
            -Dorg.gradle.jvmargs="-Xmx2g" \
            --no-daemon

    artifacts:
      - app/build/outputs/bundle/release/*.aab
      - app/build/outputs/apk/release/*.apk

    publishing:
      email:
        recipients:
          - cumulorosario@gmail.com
        notify:
          success: true
          failure: true
